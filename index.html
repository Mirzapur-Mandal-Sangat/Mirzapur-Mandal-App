<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mirzapur Mandal App</title>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #ffffff; font-family: sans-serif; }
        
        /* Loading Overlay */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 99999;
        }
        .spinner {
            border: 4px solid #f3f3f3; border-top: 4px solid #0088cc;
            border-radius: 50%; width: 45px; height: 45px;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Iframe settings - removed opacity transition to fix white screen bug */
        #appFrame { 
            width: 100%; height: 100vh; border: none; 
            display: block; visibility: visible; 
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text">Mirzapur Mandal App लोड हो रहा है...</div>
    </div>

    <iframe id="appFrame" 
            src="https://script.google.com/macros/s/AKfycbxNpiAoEV8xrhD-dsQhUy2Z4Y5iYiVQzyfOQu3FBJvRyrHnEYVE3d5l6ISH5aaaumc/exec"
            allow="geolocation; microphone; camera"
            onload="hideLoader()"></iframe>

    <script>
        // Service worker setup
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW setup failed:', err));
        }

        // Force reload watchdog
        let loadCheckTimer = setTimeout(() => {
            console.log("Loading timed out, refreshing...");
            location.reload();
        }, 10000); // 10 सेकंड का वेट

        function hideLoader() {
            clearTimeout(loadCheckTimer);
            const loader = document.getElementById('loading-overlay');
            if (loader) {
                // Completely remove the element so it doesn't block clicks
                loader.remove();
            }
            // Force focus
            document.getElementById('appFrame').focus();
        }

        window.addEventListener("message", (event) => {
            if (event.data === "logged_out") {
                location.reload(); 
            }
        }, false);
    </script>
</body>
</html>
