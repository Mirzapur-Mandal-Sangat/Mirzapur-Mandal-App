<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirzapur Mandal App</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; font-family: sans-serif; background: #f4f7f6; margin: 0;
        }
        .container { text-align: center; color: #555; padding: 20px; }
        .spinner { 
            border: 4px solid #f3f3f3; border-top: 4px solid #0088cc; 
            border-radius: 50%; width: 40px; height: 40px; 
            animation: spin 1s linear infinite; margin: 0 auto 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="spinner"></div>
        <h3>Mirzapur Mandal App load ho rahi hai...</h3>
        <p>Kripya pratiksha karein.</p>
    </div>

    <script>
        // Redirect to original app URL to fix login/cookie issues
        window.location.replace("https://script.google.com/macros/s/AKfycbxNpiAoEV8xrhD-dsQhUy2Z4Y5iYiVQzyfOQu3FBJvRyrHnEYVE3d5l6ISH5aaaumc/exec");

        // Service Worker registration for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
