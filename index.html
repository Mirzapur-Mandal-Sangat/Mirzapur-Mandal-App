<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mirzapur Mandal App</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #ffffff; font-family: sans-serif; }
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 99999;
        }
        .spinner {
            border: 4px solid #f3f3f3; border-top: 4px solid #0088cc;
            border-radius: 50%; width: 45px; height: 45px;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        iframe { width: 100%; height: 100vh; border: none; display: block; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text">Loading...</div>
    </div>

    <iframe id="appFrame" 
            src="https://script.google.com/macros/s/AKfycbxNpiAoEV8xrhD-dsQhUy2Z4Y5iYiVQzyfOQu3FBJvRyrHnEYVE3d5l6ISH5aaaumc/exec"
            allow="geolocation; microphone; camera"></iframe>

    <script>
        const frame = document.getElementById('appFrame');
        let loadCheckTimer;

        // 🛡️ ERR_BLOCKED_BY_RESPONSE ya loading fail hone par auto-refresh
        function startWatchdog() {
            loadCheckTimer = setTimeout(() => {
                console.log("Loading taking too long, refreshing...");
                location.reload();
            }, 7000); // 7 सेकंड में लोड न हुआ तो रिफ्रेश
        }

        // Iframe load hote hi timer band
        frame.onload = () => {
            clearTimeout(loadCheckTimer);
            document.getElementById('loading-overlay').style.display = 'none';
        };

        // Service Worker setup
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW failed:', err));
        }

        // Start watch
        startWatchdog();
    </script>
</body>
</html>
