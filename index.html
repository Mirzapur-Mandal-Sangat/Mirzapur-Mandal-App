<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mirzapur Mandal App</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #ffffff; display: flex; justify-content: center; align-items: center; }
        .spinner { border: 5px solid #f3f3f3; border-top: 5px solid #0088cc; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="spinner"></div>

    <script>
        // सीधे Google Script पर भेजें (यह Iframe एरर को पूरी तरह खत्म कर देगा)
        // Telegram ब्राउज़र इसे आसानी से हैंडल कर लेगा
        const scriptUrl = "https://script.google.com/macros/s/AKfycbxNpiAoEV8xrhD-dsQhUy2Z4Y5iYiVQzyfOQu3FBJvRyrHnEYVE3d5l6ISH5aaaumc/exec";
        
        // एक छोटा सा डिले ताकि लोडर दिखे
        setTimeout(() => {
            window.location.replace(scriptUrl);
        }, 500);
    </script>
</body>
</html>
