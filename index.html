<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirzapur Mandal App</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #ffffff; }
        
        #loader { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #ffffff; display: flex; justify-content: center; 
            align-items: center; z-index: 9999; 
        }
        
        .spinner { 
            border: 4px solid #f3f3f3; border-top: 4px solid #3498db; 
            border-radius: 50%; width: 40px; height: 40px; 
            animation: spin 1s linear infinite; 
        }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        iframe { width: 100%; height: 100vh; border: none; display: block; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
    </div>

    <iframe id="mainFrame" 
            src="https://script.google.com/macros/s/AKfycbxNpiAoEV8xrhD-dsQhUy2Z4Y5iYiVQzyfOQu3FBJvRyrHnEYVE3d5l6ISH5aaaumc/exec" 
            allow="camera; microphone; geolocation; autoplay; encrypted-media; clipboard-write"
            title="Mirzapur Mandal App">
    </iframe>

    <script>
        const iframe = document.getElementById('mainFrame');
        const loader = document.getElementById('loader');

        // Page load hote hi loader hatao aur iframe ko focus karo
        iframe.onload = () => { 
            loader.style.display = 'none'; 
            iframe.focus(); 
        };

        // Agar user kahi bhi click kare, toh iframe ko focus mil jaye
        window.addEventListener('click', () => { 
            iframe.focus(); 
        });

        // Service Worker Register
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
