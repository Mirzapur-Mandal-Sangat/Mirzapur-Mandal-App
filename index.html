<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="theme-color" content="#ffffff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <title>Mirzapur Mandal App</title>
    
    <link rel="preconnect" href="https://script.google.com">
    <link rel="preconnect" href="https://script.googleusercontent.com" crossorigin>
    <link rel="dns-prefetch" href="https://script.google.com">
    <link rel="dns-prefetch" href="https://script.googleusercontent.com">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background-color: #ffffff; 
            font-family: sans-serif; touch-action: manipulation; 
        }
        
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 99999;
            transition: opacity 0.3s ease;
        }
        .spinner {
            border: 4px solid #f3f3f3; border-top: 4px solid #0088cc;
            border-radius: 50%; width: 45px; height: 45px;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loading-text { color: #004d99; font-weight: bold; font-size: 16px; letter-spacing: 0.5px; }

        iframe { width: 100%; height: 100vh; border: none; display: block; opacity: 0; transition: opacity 0.3s ease; }
        iframe.loaded { opacity: 1; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text">Mirzapur Mandal App लोड हो रहा है...</div>
    </div>

    <!-- Iframe me sandbox aur baki permissions add ki gayi hain -->
    <iframe id="appFrame" 
            src="https://script.google.com/macros/s/AKfycbxNpiAoEV8xrhD-dsQhUy2Z4Y5iYiVQzyfOQu3FBJvRyrHnEYVE3d5l6ISH5aaaumc/exec"
            allow="geolocation; microphone; camera; display-capture; clipboard-read; clipboard-write"
            sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-top-navigation"
            onload="handleIframeLoad()"></iframe>

    <script>
        // 1. Service Worker Setup
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                .then(() => console.log('SW Registered successfully'))
                .catch(err => console.log('SW setup failed:', err));
            });
        }

        // 2. Hide Loader Function
        function hideLoader() {
            const loader = document.getElementById('loading-overlay');
            const frame = document.getElementById('appFrame');
            
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
                frame.classList.add('loaded');
            }, 300);
        }

        // 3. Iframe Load Handler (with First-Load Fix)
        function handleIframeLoad() {
            hideLoader();

            // Agar ye user ka pehla visit hai (browser session mein), toh ek baar auto-refresh karega
            // jisse ERR_BLOCKED_BY_RESPONSE wala error kabhi user ko nahi dikhega.
            if (!sessionStorage.getItem('isFirstLoadDone')) {
                sessionStorage.setItem('isFirstLoadDone', 'true');
                
                // Iframe ko choti si deri ke baad reload karte hain taaki Google cache set ho jaye
                setTimeout(() => {
                    const frame = document.getElementById('appFrame');
                    frame.src = frame.src; 
                }, 500); 
            }
        }

        // 4. Safety Fallback (Agar network slow ho toh 8 sec baad loader hta de)
        setTimeout(() => {
            const loader = document.getElementById('loading-overlay');
            if (loader.style.display !== 'none') {
                hideLoader();
            }
        }, 8000); 

        // 5. App se aane wale messages (Jaise logout)
        window.addEventListener("message", (event) => {
            if (event.data === "logged_out") {
                sessionStorage.removeItem('isFirstLoadDone'); // Logout par session clear
                location.reload(); 
            }
        }, false);
    </script>
</body>
</html>
