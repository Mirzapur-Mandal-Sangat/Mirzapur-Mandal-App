<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mirzapur Mandal App</title>

<link rel="manifest" href="manifest.json">

<style>
html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#fff;
}

iframe{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:none;
    display:block;
    background:#fff;
}

#loader{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:99999;
    opacity:1;
    transition:opacity .4s ease;
}

.spinner{
    width:45px;
    height:45px;
    border:4px solid #e5e5e5;
    border-top:4px solid #2196F3;
    border-radius:50%;
    animation:spin .8s linear infinite;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

.hide{
    opacity:0;
    pointer-events:none;
}
</style>
</head>

<body>

<div id="loader">
    <div class="spinner"></div>
</div>

<iframe
id="mainFrame"
loading="eager"
allow="camera; microphone; geolocation; autoplay; clipboard-write"
referrerpolicy="no-referrer"
src="https://script.google.com/macros/s/AKfycbxNpiAoEV8xrhD-dsQhUy2Z4Y5iYiVQzyfOQu3FBJvRyrHnEYVE3d5l6ISH5aaaumc/exec">
</iframe>

<script>

const loader=document.getElementById("loader");
const frame=document.getElementById("mainFrame");

let hidden=false;

function hideLoader(){

    if(hidden) return;

    hidden=true;

    loader.classList.add("hide");

    setTimeout(()=>{
        loader.remove();
    },400);

}

// iframe load
frame.addEventListener("load",hideLoader);

// Backup (अगर load event न आए)
setTimeout(hideLoader,3000);

// Window loaded
window.addEventListener("load",()=>{
    setTimeout(hideLoader,500);
});

// User interaction backup
["click","touchstart","keydown"].forEach(event=>{
    window.addEventListener(event,hideLoader,{once:true});
});

// Register Service Worker
if("serviceWorker" in navigator){
    navigator.serviceWorker.register("sw.js").catch(()=>{});
}

</script>

</body>
</html>
